name: ps4-release

on:
  push:
    tags:
      - "v*.*"
  workflow_dispatch:

jobs:

  build-ps4-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt -yq update
          sudo apt -yq install git build-essential cmake zip libgpgme11 libssl-dev
    
      - name: Ensure OpenSSL 1.1 (libssl1.1) is available
        run: |
          set -e
          sudo apt-get update -y
          # Try to install from apt first
          if sudo apt-get install -y libssl1.1; then
            echo "libssl1.1 installed via apt"
          else
            echo "libssl1.1 not available via apt; downloading .deb from archive"
            # Download a matching libssl1.1 package from the Ubuntu archive. Adjust if necessary.
            wget -q https://archive.ubuntu.com/ubuntu/pool/main/o/openssl1.1/libssl1.1_1.1.1f-1ubuntu2.19_amd64.deb
            sudo dpkg -i libssl1.1_1.1.1f-1ubuntu2.19_amd64.deb || sudo apt-get -fy install
          fi
          # Verify library is available (non-fatal if not found)
          ldconfig -p | grep libcrypto.so.1.1 || true
          
      - name: Install ps4 toolchain
        run: |
          wget https://github.com/PacBrew/pacbrew-pacman/releases/download/pacbrew-release-1.0/pacbrew-pacman-1.0.deb
          sudo dpkg -i pacbrew-pacman-1.0.deb
          sudo pacbrew-pacman -Syu
          sudo pacbrew-pacman --noconfirm -S ps4-openorbis ps4-openorbis-portlibs

      - name: Build pfbneo
        run: |
          mkdir cmake-build-pfbneo && cd cmake-build-pfbneo
          export OPENORBIS=/opt/pacbrew/ps4/openorbis
          cmake -G "Unix Makefiles" -DPLATFORM_PS4=ON -DOPTION_EMU=pfbneo -DCMAKE_BUILD_TYPE=Release ..
          make pfbneo.deps
          make -j $(getconf _NPROCESSORS_ONLN) pfbneo_pkg
          mv *.pkg $GITHUB_WORKSPACE

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: '*.pkg'
          token: ${{ secrets.RELEASE_TOKEN }}
