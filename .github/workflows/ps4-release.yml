name: ps4-release

on:
  push:
    tags:
      - "v*.*"
  workflow_dispatch:

jobs:

  build-ps4-release:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v2
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt -yq update
          sudo apt -yq install git build-essential cmake zip libgpgme11 libssl-dev
    
      - name: Ensure OpenSSL 1.1 (libssl1.1) is available
        run: |
          set -euo pipefail
          sudo apt-get update -y

          # Try normal apt install first
          if sudo DEBIAN_FRONTEND=noninteractive apt-get install -y libssl1.1 2>/dev/null; then
            echo "libssl1.1 installed via apt"
          else
            echo "libssl1.1 not available via apt; downloading .deb from archive"
            for url in \
              "https://archive.ubuntu.com/ubuntu/pool/main/o/openssl1.1/libssl1.1_1.1.1w-1~22.04.1_amd64.deb" \
              "https://launchpad.net/ubuntu/+archive/primary/+files/libssl1.1_1.1.1w-1~22.04.1_amd64.deb" \
              "https://archive.ubuntu.com/ubuntu/pool/main/o/openssl1.1/libssl1.1_1.1.1f-1ubuntu2.19_amd64.deb"; do
              if wget -q "$url" -O libssl1.1.deb; then
                sudo dpkg -i libssl1.1.deb || sudo apt-get -f -y install
                break
              fi
            done
          fi

          sudo ldconfig

          # Verify presence of libcrypto.so.1.1; fail early with helpful diagnostics if missing
          if ldconfig -p | grep -q "libcrypto.so.1.1"; then
            echo "libcrypto.so.1.1 found successfully"
          else
            echo "ERROR: libcrypto.so.1.1 not found after installation attempts."
            echo "Current libcrypto entries:"
            ldconfig -p | grep libcrypto || true
            echo "ldd on pacman binary (if present):"
            if [ -x /opt/pacbrew/pacman ]; then
              ldd /opt/pacbrew/pacman | grep libcrypto || true
            fi
            exit 1
          fi
            
      - name: Install ps4 toolchain
        run: |
          wget https://github.com/PacBrew/pacbrew-pacman/releases/download/pacbrew-release-1.0/pacbrew-pacman-1.0.deb
          sudo dpkg -i pacbrew-pacman-1.0.deb
          sudo pacbrew-pacman -Syu
          sudo pacbrew-pacman --noconfirm -S ps4-openorbis ps4-openorbis-portlibs

      - name: Build pfbneo
        run: |
          mkdir cmake-build-pfbneo && cd cmake-build-pfbneo
          export OPENORBIS=/opt/pacbrew/ps4/openorbis
          cmake -G "Unix Makefiles" -DPLATFORM_PS4=ON -DOPTION_EMU=pfbneo -DCMAKE_BUILD_TYPE=Release ..
          make pfbneo.deps
          make -j $(getconf _NPROCESSORS_ONLN) pfbneo_pkg
          mv *.pkg $GITHUB_WORKSPACE

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: '*.pkg'
          token: ${{ secrets.RELEASE_TOKEN }}
