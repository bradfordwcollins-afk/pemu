name: PS4 PKG Build (HT Branch - Fixed)

on:
  push:
    branches: [ HT ]
  workflow_dispatch:

jobs:
  build-ps4:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout HT branch
        uses: actions/checkout@v4
        with:
          ref: HT
          submodules: recursive

      - name: Install base dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git build-essential cmake zip \
            pacman-package-manager makepkg libarchive-tools autoconf libtool nasm curl

      - name: Setup PS4 Toolchain (OpenOrbis + Portlibs)
        run: |
          sudo tee -a /etc/pacman.conf > /dev/null <<EOF
          [pacbrew]
          SigLevel = Optional TrustAll
          Server = https://pacman.mydedibox.fr/pacbrew/packages/
          EOF

          sudo pacman -Syu --noconfirm
          sudo pacman -S --noconfirm ps4-openorbis ps4-openorbis-portlibs

          # Extra fix for missing GLES headers
          sudo pacman -S --noconfirm ps4-openorbis-portlibs || true

      - name: Configure
        run: |
          mkdir -p cmake-build && cd cmake-build
          export OPENORBIS=/opt/pacbrew/ps4/openorbis
          cmake -G "Unix Makefiles" \
            -DPLATFORM_PS4=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-Wno-error -Wno-unknown-warning-option -Wno-format-truncation -Wno-restrict" \
            ..

      - name: Build pfbneo PKG
        run: |
          cd cmake-build
          make pfbneo.deps -j2
          make -j"$(nproc)" pfbneo_pkg || echo "=== Build failed - see above ==="

      - name: Upload PS4 PKGs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pemu-ps4-ht-build
          path: |
            *.pkg
            cmake-build/*.pkg
          retention-days: 14
