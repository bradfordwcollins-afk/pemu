name: PS4 PKG Build (HT Branch - Fixed)

on:
  push:
    branches: [ HT ]
  workflow_dispatch:

jobs:
  build-ps4:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout HT branch
        uses: actions/checkout@v4
        with:
          ref: HT
          submodules: recursive

      - name: Install base dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git build-essential cmake zip \
            pacman-package-manager makepkg libarchive-tools autoconf libtool nasm curl

      - name: Setup PS4 Toolchain (OpenOrbis + Portlibs)
        run: |
          sudo tee -a /etc/pacman.conf > /dev/null <<EOF
          [pacbrew]
          SigLevel = Optional TrustAll
          Server = https://pacman.mydedibox.fr/pacbrew/packages/
          EOF
          sudo pacman -Syu --noconfirm
          # Full reinstall for GLES2 / SDL headers
          sudo pacman -S --noconfirm ps4-openorbis ps4-openorbis-portlibs
          sudo pacman -S --noconfirm ps4-openorbis-sdl2 ps4-openorbis-portlibs || true

      - name: Configure and Build
        run: |
          export OPENORBIS=/opt/pacbrew/ps4/openorbis
          
          # Aggressive toolchain fix for missing GLES2 headers
          sudo pacman -S --noconfirm ps4-openorbis-portlibs ps4-openorbis-sdl2
          mkdir -p /opt/pacbrew/ps4/openorbis/usr/include/GLES2
          # Copy common GLES headers if they exist anywhere in the install
          find /opt/pacbrew/ps4/openorbis -name "gl2platform.h" -exec cp --parents {} /opt/pacbrew/ps4/openorbis/usr/include/ \; 2>/dev/null || true
          find /opt/pacbrew/ps4/openorbis -name "gl2.h" -exec cp --parents {} /opt/pacbrew/ps4/openorbis/usr/include/ \; 2>/dev/null || true
          find /opt/pacbrew/ps4/openorbis -name "gl2ext.h" -exec cp --parents {} /opt/pacbrew/ps4/openorbis/usr/include/ \; 2>/dev/null || true
          
          mkdir -p cmake-build && cd cmake-build

          cmake -G "Unix Makefiles" \
            -DPLATFORM_PS4=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-Wno-error -Wno-unknown-warning-option -Wno-format-truncation -Wno-restrict -Wno-error=implicit-function-declaration" \
            ..

          make pfbneo.deps -j2

          make -j$(nproc) pfbneo_pkg || echo "=== Build failed - see above ==="

          mv *.pkg ../ 2>/dev/null || true

      - name: Upload PS4 PKGs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pemu-ps4-ht-build
          path: |
            *.pkg
            cmake-build/*.pkg
          retention-days: 14
